    <h1>Formulaire de cotnact</h1>
    <h2>Veuillez remplir l'ensemble des informations afin d'être contacté par nos équipes</h2>
    <form method="post" name="formulaire" action="#" id="formulaire_contact" onsubmit="return false">
        <fieldset id="form_infos">
            <legend>Informations personelles</legend>

            <label for="nom">Nom :</label>
            <input type="text" id="nom"><br>

            <label for="prenom">Prénom :</label>
            <input type="text" id="prenom"><br>

            <label for="date_naissance">Date de naissance :</label>
            <input type="date" id="date_naissance"><br>

            <label for="num_tel">Numéro de téléphone :</label>
            <input type="tel" id="num_tel"><br>

            <label for="email">E-mail :</label>
            <input type="email" id="email"><br>

            <label for="type_personne">Vous êtes:</label>
            <select name="type" id="type_personne">
                <option value="non rempli">Veuillez choisir une option</option>
                <option value="Lycéen">Lycéen</option>
                <option value="Enseignement supérieur">Etudiant dans l'enseignement supérieur</option>
                <option value="Parent">Parent</option>
            </select>
        </fieldset>
        <fieldset id="form_question">
            <label for="question">Veuillez entrer votre question</label><br>
            <textarea id="question"></textarea> <br>

            <label for="cgu">Vous acceptez les conditions générales du site</label>
            <input type="checkbox" id="cgu">

        </fieldset>
         <input type="submit" id="envoyerQuiz" value="Envoyer" class="quiz" onclick="envoyer()">
    </form>
